  <text x="60" y="475" fill="#86efac" font-size="13" font-weight="700">SHAREPOINT DOCUMENT LIBRARIES</text>

  <!-- Doc library cards -->
  <rect x="60" y="490" width="120" height="30" rx="6" fill="#14532d" stroke="#4ade80" stroke-width="0.8"/>
  <text x="120" y="510" text-anchor="middle" fill="#dcfce7" font-size="10">📄 RFP Templates</text>

  <rect x="195" y="490" width="120" height="30" rx="6" fill="#14532d" stroke="#4ade80" stroke-width="0.8"/>
  <text x="255" y="510" text-anchor="middle" fill="#dcfce7" font-size="10">📨 Issued RFPs</text>

  <rect x="330" y="490" width="130" height="30" rx="6" fill="#14532d" stroke="#4ade80" stroke-width="0.8"/>
  <text x="395" y="510" text-anchor="middle" fill="#dcfce7" font-size="10">📬 Partner Responses</text>

  <rect x="475" y="490" width="115" height="30" rx="6" fill="#14532d" stroke="#4ade80" stroke-width="0.8"/>
  <text x="532" y="510" text-anchor="middle" fill="#dcfce7" font-size="10">📝 Eval Reports</text>

  <rect x="60" y="535" width="120" height="30" rx="6" fill="#14532d" stroke="#4ade80" stroke-width="0.8"/>
  <text x="120" y="555" text-anchor="middle" fill="#dcfce7" font-size="10">⚖️ Standard Terms</text>

  <rect x="195" y="535" width="130" height="30" rx="6" fill="#14532d" stroke="#4ade80" stroke-width="0.8"/>
  <text x="260" y="555" text-anchor="middle" fill="#dcfce7" font-size="10">📚 Knowledge Base</text>

  <!-- ── Layer 4b: Outlook ── -->
  <rect x="620" y="450" width="240" height="150" rx="12" fill="#2d1f0e" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="640" y="475" fill="#fdba74" font-size="13" font-weight="700">OUTLOOK / EXCHANGE</text>

  <rect x="640" y="495" width="200" height="30" rx="6" fill="#431407" stroke="#fb923c" stroke-width="0.8"/>
  <text x="740" y="515" text-anchor="middle" fill="#ffedd5" font-size="10">📧 RFP Distribution</text>

  <rect x="640" y="535" width="200" height="30" rx="6" fill="#431407" stroke="#fb923c" stroke-width="0.8"/>
  <text x="740" y="555" text-anchor="middle" fill="#ffedd5" font-size="10">📩 Response Collection</text>

  <rect x="640" y="575" width="200" height="30" rx="6" fill="#431407" stroke="#fb923c" stroke-width="0.8"/>
  <text x="740" y="595" text-anchor="middle" fill="#ffedd5" font-size="10">⏰ Deadline Reminders</text>
</svg>

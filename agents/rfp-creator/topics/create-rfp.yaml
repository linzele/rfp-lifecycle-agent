kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Create RFP
    includeInOnSelectIntent: true
    triggerQueries:
      - Create an RFP
      - New RFP
      - Create RFP
      - Draft an RFP
      - Start a new RFP
      - I need to create a request for proposal
      - Prepare an RFP
      - Build an RFP
  actions:
    - kind: Question
      id: ask_project_name
      interruptionPolicy:
        allowInterruption: true
      variable: init:Topic.ProjectName
      prompt: What is the project name for this RFP?
      entity:
        kind: StringPrebuiltEntity
    - kind: Question
      id: ask_engagement_type
      interruptionPolicy:
        allowInterruption: true
      variable: init:Topic.EngagementType
      prompt: What engagement type is this RFP for?
      entity:
        kind: EmbeddedEntity
        definition:
          kind: ClosedListEntity
          items:
            - id: turnkey
              displayName: Turnkey Project
            - id: managed_services
              displayName: Managed Services
            - id: augmented_resources
              displayName: Augmented Resources
    - kind: Question
      id: ask_project_description
      interruptionPolicy:
        allowInterruption: true
      variable: init:Topic.ProjectDescription
      prompt: Please provide a brief description of the project scope and objectives.
      entity:
        kind: StringPrebuiltEntity
    - kind: Question
      id: ask_budget_range
      interruptionPolicy:
        allowInterruption: true
      variable: init:Topic.BudgetRange
      prompt: What is the estimated budget range (e.g., SGD 500K to 1M)?
      entity:
        kind: StringPrebuiltEntity
    - kind: Question
      id: ask_timeline
      interruptionPolicy:
        allowInterruption: true
      variable: init:Topic.Timeline
      prompt: What is the expected project timeline (start date and duration)?
      entity:
        kind: StringPrebuiltEntity
    - kind: Question
      id: ask_submission_deadline
      interruptionPolicy:
        allowInterruption: true
      variable: init:Topic.SubmissionDeadline
      prompt: What is the RFP submission deadline for partners?
      entity:
        kind: DateTimePrebuiltEntity
    - kind: SendActivity
      id: confirm_details
      activity:
        text:
          -  RFP Summary  Please Confirm   Project {Topic.ProjectName}  Type {Topic.EngagementType}  Description {Topic.ProjectDescription}  Budget {Topic.BudgetRange}  Timeline {Topic.Timeline}  Deadline {Topic.SubmissionDeadline}  Shall I generate the RFP document now?

    - kind: Question
      id: ask_confirm
      interruptionPolicy:
        allowInterruption: true
      variable: init:Topic.Confirmed
      prompt: Type Yes to generate or No to make changes.
      entity:
        kind: BooleanPrebuiltEntity
    - kind: ConditionGroup
      id: check_confirmation
      conditions:
        - id: confirmed_yes
          condition: =Topic.Confirmed = true
          actions:
            - kind: InvokeFlowAction
              id: call_generate_rfp_flow
              input:
                binding:
                  text: =Topic.ProjectName
                  text_1: =Topic.EngagementType
                  text_2: =Topic.ProjectDescription
                  text_3: =Topic.BudgetRange
                  text_4: =Topic.Timeline
                  text_5: =Topic.SubmissionDeadline
              output:
                binding:
                  rfpReference: Topic.RFPReference
                  documentUrl: Topic.DocumentUrl
              flowId: 00000000-0000-0000-0000-000000000000

            - kind: SendActivity
              id: success_message
              activity:
                text:
                  -  RFP Generated Successfully!   Reference {Topic.RFPReference}  Document {Topic.DocumentUrl}  The RFP has been saved to the SharePoint document library. You can now  Say Issue RFP to send it to partners  Say Edit RFP to make changes

      elseActions:
        - kind: SendActivity
          id: cancelled_message
          activity:
            text:
              - No problem, let me know what you would like to change. You can say Create RFP again when ready.
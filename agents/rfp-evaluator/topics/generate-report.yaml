kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Generate Report
    includeInOnSelectIntent: true
    triggerQueries:
      - Generate report
      - Create evaluation report
      - Produce report
      - Build the report
      - Final report
      - Compile evaluation
  actions:
    - kind: Question
      id: ask_rfp_reference
      interruptionPolicy:
        allowInterruption: true
      variable: init:Topic.RFPReference
      prompt: Which RFP Reference should the evaluation report be for?
      entity:
        kind: StringPrebuiltEntity
    - kind: Question
      id: ask_recommendation
      interruptionPolicy:
        allowInterruption: true
      variable: init:Topic.Recommendation
      prompt: Based on the evaluation, which partner do you recommend (or should I recommend the highest scorer)?
      entity:
        kind: StringPrebuiltEntity
    - kind: Question
      id: ask_comments
      interruptionPolicy:
        allowInterruption: true
      variable: init:Topic.AdditionalComments
      prompt: Any additional comments or caveats to include in the report? Type None to skip.
      entity:
        kind: StringPrebuiltEntity
    - kind: InvokeFlowAction
      id: call_generate_report_flow
      input:
        binding:
          text: =Topic.RFPReference
          text_1: =Topic.Recommendation
          text_2: =Topic.AdditionalComments
      output:
        binding:
          reportUrl: Topic.ReportUrl
          reportReference: Topic.ReportReference
      flowId: 00000000-0000-0000-0000-000000000000

    - kind: SendActivity
      id: report_generated
      activity:
        text:
          -  Evaluation Report Generated!   Report {Topic.ReportReference}  Document {Topic.ReportUrl}  Recommendation {Topic.Recommendation}  The report has been posted to the Teams Deal Room for review. Approvers can click Approve or Request Changes on the Adaptive Card.   RFP lifecycle for {Topic.RFPReference} is now pending approval.
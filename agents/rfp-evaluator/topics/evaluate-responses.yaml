kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Evaluate Responses
    includeInOnSelectIntent: true
    triggerQueries:
      - Evaluate responses
      - Evaluate RFP
      - Score responses
      - Compare proposals
      - Start evaluation
      - Assess partner responses
      - Review submissions
  actions:
    - kind: Question
      id: ask_rfp_reference
      interruptionPolicy:
        allowInterruption: true
      variable: init:Topic.RFPReference
      prompt: Which RFP Reference would you like to evaluate? For example KG-RFP-2026-001
      entity:
        kind: StringPrebuiltEntity
    - kind: InvokeFlowAction
      id: call_retrieve_responses
      input:
        binding:
          text: =Topic.RFPReference
      output:
        binding:
          partnerCount: Topic.PartnerCount
          partnerList: Topic.PartnerList
          engagementType: Topic.EngagementType
      flowId: 00000000-0000-0000-0000-000000000000
    - kind: SendActivity
      id: show_responses
      activity:
        text:
          - Found {Topic.PartnerCount} responses for {Topic.RFPReference}. Partners - {Topic.PartnerList}. Engagement Type - {Topic.EngagementType}. I will now evaluate each response against the standard criteria including compliance check, technical capability scoring 1 to 5, commercial comparison, and risk assessment. Shall I proceed with the full evaluation?
    - kind: Question
      id: ask_confirm_eval
      interruptionPolicy:
        allowInterruption: true
      variable: init:Topic.Confirmed
      prompt: Type Yes to start evaluation or No to cancel.
      entity:
        kind: BooleanPrebuiltEntity
    - kind: ConditionGroup
      id: check_confirmation
      conditions:
        - id: confirmed_yes
          condition: =Topic.Confirmed = true
          actions:
            - kind: SearchAndSummarizeContent
              id: evaluate_with_ai
              userMessage: Evaluate the RFP responses for {Topic.RFPReference} of type {Topic.EngagementType}. For each partner assess compliance with mandatory requirements as Pass or Fail, technical capability score 1 to 5 with justification, team composition and experience, methodology and approach, commercial competitiveness, and risk factors. Produce a structured comparison matrix.
              moderationLevel: Medium
              responseSources:
                - kind: SearchKnowledgeSources
              additionalInstructions: Use the evaluation framework from the knowledge base. Score each criterion on a 1-5 scale where 5 is Exceptional, 4 is Strong, 3 is Adequate, 2 is Marginal, 1 is Non-compliant. Apply engagement-type-specific weightings. Flag any compliance failures as automatic disqualifiers.
            - kind: SendActivity
              id: eval_complete
              activity:
                text:
                  - Evaluation Complete for {Topic.RFPReference}. The AI-assisted evaluation has been generated above. You can now say Generate Report to create a formal report, or tell me which scoring weights to adjust, or provide your additional team feedback comments.
      elseActions:
        - kind: SendActivity
          id: cancelled_message
          activity:
            text:
              - Evaluation cancelled. Say Evaluate Responses when you are ready.

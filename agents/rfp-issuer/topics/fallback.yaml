kind: AdaptiveDialog
beginDialog:
  kind: OnUnknownIntent
  id: main
  actions:
    - kind: SearchAndSummarizeContent
      id: search_knowledge
      userMessage: =System.Activity.Text
      moderationLevel: Medium
      responseSources:
        - kind: SearchKnowledgeSources
      additionalInstructions: >
        You are the RFP Issuer Agent. Answer questions about:
        - RFP distribution and issuance process
        - Partner tracking and response monitoring
        - Reminder policies and deadlines
        - Email templates and communication standards
        If the user wants to issue an RFP, guide them to say "Issue RFP".
        If they want status, guide them to say "Check Status".
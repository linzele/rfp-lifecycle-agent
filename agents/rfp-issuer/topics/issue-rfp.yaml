kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Issue RFP
    includeInOnSelectIntent: true
    triggerQueries:
      - Issue RFP
      - Send RFP
      - Distribute RFP
      - Send RFP to partners
      - Email the RFP
      - Issue the request for proposal
  actions:
    - kind: Question
      id: ask_rfp_reference
      interruptionPolicy:
        allowInterruption: true
      variable: init:Topic.RFPReference
      prompt: What is the RFP Reference number (e.g., KG-RFP-2026-001)?
      entity:
        kind: StringPrebuiltEntity
    - kind: Question
      id: ask_partner_count
      interruptionPolicy:
        allowInterruption: true
      variable: init:Topic.PartnerCount
      prompt: How many partners should receive this RFP?
      entity:
        kind: NumberPrebuiltEntity
    - kind: SendActivity
      id: partner_instructions
      activity:
        text:
          - Please provide each partner details in this format  Name, Company, Email  For example John Doe, Acme Corp, john@acme.com  Enter one partner per message. Type Done when finished.

    - kind: Question
      id: collect_partners
      interruptionPolicy:
        allowInterruption: true
      variable: init:Topic.PartnerList
      prompt: Enter partner details (Name, Company, Email):
      entity:
        kind: StringPrebuiltEntity
    - kind: Question
      id: ask_deadline
      interruptionPolicy:
        allowInterruption: true
      variable: init:Topic.SubmissionDeadline
      prompt: What is the submission deadline for partner responses?
      entity:
        kind: DateTimePrebuiltEntity
    - kind: Question
      id: ask_qa_deadline
      interruptionPolicy:
        allowInterruption: true
      variable: init:Topic.QADeadline
      prompt: What is the QA deadline (date by which partners can ask clarification questions)?
      entity:
        kind: DateTimePrebuiltEntity
    - kind: Question
      id: ask_contact
      interruptionPolicy:
        allowInterruption: true
      variable: init:Topic.ContactPerson
      prompt: Who is the contact person for this RFP? (Name, Email)
      entity:
        kind: StringPrebuiltEntity
    - kind: SendActivity
      id: confirm_issuance
      activity:
        text:
          -  RFP Issuance Summary  Please Confirm   RFP {Topic.RFPReference}  Partners {Topic.PartnerCount} recipients  Submission Deadline {Topic.SubmissionDeadline}  QA Deadline {Topic.QADeadline}  Contact {Topic.ContactPerson}   This will send the RFP email to all listed partners. Proceed?

    - kind: Question
      id: ask_confirm
      interruptionPolicy:
        allowInterruption: true
      variable: init:Topic.Confirmed
      prompt: Type Yes to send or No to cancel.
      entity:
        kind: BooleanPrebuiltEntity
    - kind: ConditionGroup
      id: check_confirmation
      conditions:
        - id: confirmed_yes
          condition: =Topic.Confirmed = true
          actions:
            - kind: InvokeFlowAction
              id: call_issue_rfp_flow
              input:
                binding:
                  text: =Topic.RFPReference
                  text_1: =Topic.PartnerList
                  text_2: =Topic.SubmissionDeadline
                  text_3: =Topic.QADeadline
                  text_4: =Topic.ContactPerson
              output:
                binding:
                  issuedCount: Topic.IssuedCount
              flowId: 00000000-0000-0000-0000-000000000000

            - kind: SendActivity
              id: success_message
              activity:
                text:
                  -  RFP Issued Successfully!   RFP {Topic.RFPReference}  Emails sent {Topic.IssuedCount}  Tracking Active in SharePoint  I will monitor responses and send reminders automatically. Say Check Status anytime to see progress.

      elseActions:
        - kind: SendActivity
          id: cancelled_message
          activity:
            text:
              - Issuance cancelled. No emails were sent. Say Issue RFP when you are ready to try again.
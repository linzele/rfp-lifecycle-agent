kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Check RFP Status
    includeInOnSelectIntent: true
    triggerQueries:
      - Check status
      - RFP status
      - How many responses
      - Partner responses
      - Track RFP
      - What is the status
      - Show me the tracking
  actions:
    - kind: Question
      id: ask_rfp_reference
      interruptionPolicy:
        allowInterruption: true
      variable: init:Topic.RFPReference
      prompt: Which RFP Reference would you like to check (e.g., KG-RFP-2026-001)?
      entity:
        kind: StringPrebuiltEntity
    - kind: InvokeFlowAction
      id: call_status_flow
      input:
        binding:
          text: =Topic.RFPReference
      output:
        binding:
          status: Topic.RFPStatus
          totalPartners: Topic.TotalPartners
          responsesReceived: Topic.ResponsesReceived
          responsesPending: Topic.ResponsesPending
          deadline: Topic.Deadline
          partnerDetails: Topic.PartnerDetails
      flowId: 00000000-0000-0000-0000-000000000000
    - kind: SendActivity
      id: status_message
      activity:
        text:
          -  RFP Status: {Topic.RFPReference}   Status: {Topic.RFPStatus}  Deadline: {Topic.Deadline}  Responses: {Topic.ResponsesReceived} / {Topic.TotalPartners}  Pending: {Topic.ResponsesPending}  Partner Details: {Topic.PartnerDetails}  Would you like me to send reminders to partners who have not responded?

kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Greeting
    includeInOnSelectIntent: false
    triggerQueries:
      - Hello
      - Hi
      - Start
      - Help me issue an RFP
      - I need to send an RFP
      - RFP Issuer
  actions:
    - kind: SendActivity
      id: greeting_message
      activity:
        text:
          -  Welcome to the RFP Issuer Agent!  I can help you   Issue an RFP to invited partners via email  Check RFP status and partner response tracking  Send reminders to partners with pending responses  Say Issue RFP to distribute an RFP, or Check Status to review tracking.